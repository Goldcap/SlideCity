name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: slidecity-linux-x86_64
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: slidecity-windows-x86_64
            ext: ".exe"
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: slidecity-macos-arm64
            ext: ""

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.os }})

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libgl1-mesa-dev libx11-dev libxi-dev libxkbcommon-dev libudev-dev pkg-config libwayland-dev libxrandr-dev libxinerama-dev libxcursor-dev

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Download Kenney building models (CC0)
        shell: bash
        run: |
          mkdir -p assets/models/buildings/{residential,commercial,industrial}
          TMP=$(mktemp -d)

          echo "Downloading City Kit (Suburban)..."
          curl -sL -o "$TMP/suburban.zip" "https://kenney.nl/media/pages/assets/city-kit-suburban/167f6dbc31-1745479373/kenney_city-kit-suburban_20.zip"
          unzip -o -q "$TMP/suburban.zip" -d "$TMP/suburban"
          find "$TMP/suburban" -path "*/GLB format/*.glb" -exec cp {} assets/models/buildings/residential/ \;
          mkdir -p assets/models/buildings/residential/Textures
          find "$TMP/suburban" -path "*/GLB format/Textures/*" -exec cp {} assets/models/buildings/residential/Textures/ \;

          echo "Downloading City Kit (Commercial)..."
          curl -sL -o "$TMP/commercial.zip" "https://kenney.nl/media/pages/assets/city-kit-commercial/16eb35d771-1753115042/kenney_city-kit-commercial_2.1.zip"
          unzip -o -q "$TMP/commercial.zip" -d "$TMP/commercial"
          find "$TMP/commercial" -path "*/GLB format/*.glb" -exec cp {} assets/models/buildings/commercial/ \;
          mkdir -p assets/models/buildings/commercial/Textures
          find "$TMP/commercial" -path "*/GLB format/Textures/*" -exec cp {} assets/models/buildings/commercial/Textures/ \;

          echo "Downloading City Kit (Industrial)..."
          curl -sL -o "$TMP/industrial.zip" "https://kenney.nl/media/pages/assets/city-kit-industrial/1c9d714428-1750838303/kenney_city-kit-industrial_1.0.zip"
          unzip -o -q "$TMP/industrial.zip" -d "$TMP/industrial"
          find "$TMP/industrial" -path "*/GLB format/*.glb" -exec cp {} assets/models/buildings/industrial/ \;
          mkdir -p assets/models/buildings/industrial/Textures
          find "$TMP/industrial" -path "*/GLB format/Textures/*" -exec cp {} assets/models/buildings/industrial/Textures/ \;

          echo "Models: $(find assets/models/buildings -name '*.glb' | wc -l) GLB files"
          echo "Textures: $(find assets/models/buildings -name '*.png' | wc -l) texture files"
          rm -rf "$TMP"

      - name: Package binary + assets
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/slidecity${{ matrix.ext }} dist/${{ matrix.artifact }}${{ matrix.ext }}
          # Bundle all assets (textures + downloaded models)
          cp -r assets dist/assets 2>/dev/null || true
          cp .env.example dist/.env.example 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/

  # Create GitHub Release when a tag is pushed
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Package release archives
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            tar -czf "../${name}.tar.gz" -C "$dir" .
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.tar.gz
